name: HDHive Auto Checkin

on:
  schedule:
    # 每天北京时间上午 06:33 自动运行 (UTC 0:42)
    # 避开整点和半点，能显著提高被 GitHub 触发的优先级
    - cron: '33 22 * * *'
  workflow_dispatch: # 保持手动触发按钮，方便随时测试

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # 使用最新的 v4 版本

      - name: Set up Python
        uses: actions/setup-python@v5 # 使用最新的 v5 版本
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Script
        env:
          # 强制 Python 实时输出日志，不在后台缓存
          PYTHONUNBUFFERED: "1"
          # 标准的 Secrets 引用语法，必须是 ${{ }}
          HD_ACCOUNTS: ${{ secrets.HD_ACCOUNTS }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          # 核心 Action IDs
          LOGIN_ACTION_ID: ${{ secrets.LOGIN_ACTION_ID }}
          CHECKIN_ACTION_ID: ${{ secrets.CHECKIN_ACTION_ID }}
          # 赌狗签到开关
          GAMBLE_CHECKIN: ${{ secrets.GAMBLE_CHECKIN }}
        # 确保这里的文件名 checkin.py 与你仓库里的文件名完全一致
        run: python checkin.py